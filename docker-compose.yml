version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: esl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: esl_platform
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: esl_redis
    ports:
      - "6379:6379"

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: esl_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: sh -c "echo 'listener 1883\nallow_anonymous true' > /mosquitto/config/mosquitto.conf && mosquitto -c /mosquitto/config/mosquitto.conf"

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:
